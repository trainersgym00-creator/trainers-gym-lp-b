name: 日々のLP最適化

on:
  schedule:
    - cron: '0 15 * * *'  # 毎日0時JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run LP Optimizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}
          LP_TYPE: "B"
        run: node optimizer.js

      - name: Commit and push if changed
        run: |
          git config user.name "LP Auto Optimizer"
          git config user.email "optimizer@trainers-gym.com"
          git add index.html optimization-log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Auto optimize LP-B $(date '+%Y-%m-%d')"
          git diff HEAD~1 --quiet 2>/dev/null || git push
